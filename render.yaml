services:
  - type: web
    name: lexai-courtroom
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements-render.txt &&
      python scripts/build_legal_database.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        value: sqlite:///./lexai.db
    healthCheckPath: /api/v1/health
